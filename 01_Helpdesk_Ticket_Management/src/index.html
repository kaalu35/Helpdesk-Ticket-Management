<!doctype html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Helpdesk Ticket Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header><h1>Helpdesk Ticket Management</h1><p>Prebuilt demo app for support ticket tracking</p></header>
<main>
  <section class="grid">
    <article class="card"><strong id="total">0</strong><p>Total Tickets</p></article>
    <article class="card"><strong id="open">0</strong><p>Open Tickets</p></article>
    <article class="card"><strong id="resolved">0</strong><p>Resolved</p></article>
    <article class="card"><strong id="critical">0</strong><p>Critical</p></article>
  </section>
  <section class="panel">
    <div class="panel-head">
      <h2>Ticket List</h2>
      <div style="display:flex;gap:10px;width:100%;max-width:600px">
        <input id="search" placeholder="Search ticket, requester, category, priority">
        <select id="statusFilter">
          <option value="">All Status</option>
          <option>New</option><option>In Progress</option><option>Resolved</option><option>Closed</option>
        </select>
      </div>
    </div>
    <table><thead><tr><th>ID</th><th>Title</th><th>Requester</th><th>Category</th><th>Priority</th><th>Assigned To</th><th>Status</th><th>Action</th></tr></thead><tbody id="rows"></tbody></table>
    <p id="empty" class="empty" style="display:none">No tickets found.</p>
  </section>
  <section class="panel">
    <h2>Create Ticket</h2>
    <form id="form">
      <div class="form-grid">
        <label>Title<input id="title" required></label>
        <label>Requester<input id="requester" required></label>
        <label>Category<select id="category" required><option>Network</option><option>Hardware</option><option>Application</option><option>Email</option></select></label>
        <label>Priority<select id="priority" required><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select></label>
        <label>Assigned To<input id="assignedTo" placeholder="Optional"></label>
        <label>Description<textarea id="description" required></textarea></label>
      </div>
      <button>Create Ticket</button><p id="msg" class="notice"></p>
    </form>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
